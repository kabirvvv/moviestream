<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Watchlist — StreamVault</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>

  <div class="page-header">
    <h1 class="page-title">My Watchlist</h1>
    <p id="watchlistCount" style="color:var(--text-muted);font-size:0.9rem;margin-bottom:1.5rem"></p>
  </div>

  <div style="max-width:1600px;margin:0 auto;padding:0 2rem 4rem">
    <!-- Empty state -->
    <div class="watchlist-empty" id="watchlistEmpty" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
      <h2>Your watchlist is empty</h2>
      <p>Save movies and shows you want to watch later</p>
      <div style="display:flex;gap:1rem;justify-content:center;margin-top:1.5rem;flex-wrap:wrap">
        <a class="btn btn-primary" href="movies.html">Browse Movies</a>
        <a class="btn btn-secondary" href="shows.html">Browse TV Shows</a>
      </div>
    </div>

    <!-- Grid -->
    <div class="cards-grid" id="watchlistGrid"></div>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/layout.js"></script>
  <script src="assets/js/watchlist.js"></script>
</body>
</html>

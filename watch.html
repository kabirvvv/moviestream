<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch — StreamVault</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
  <link rel="stylesheet" href="assets/css/main.css">
  <style>
    body { background: #000; }
    .player-page-wrap {
      min-height: 100vh;
      display: flex; flex-direction: column;
    }
    .player-container {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      background: #000;
    }
    .player-container iframe {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      border: none;
    }
    .player-info-section {
      background: var(--bg);
      flex: 1;
      padding: 1.5rem 2rem 2rem;
    }
    .player-back {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.85rem; color: var(--text-muted);
      margin-bottom: 1.25rem;
      transition: color 0.2s;
    }
    .player-back:hover { color: var(--text); }
    .player-back svg { width: 16px; height: 16px; }
    .player-title {
      font-family: var(--font-head);
      font-size: clamp(1.4rem, 3vw, 2rem);
      letter-spacing: 0.04em;
      margin-bottom: 0.35rem;
    }
    .player-meta { font-size: 0.85rem; color: var(--text-muted); }
    .episode-nav-btns {
      display: flex; gap: 1rem; flex-wrap: wrap;
      margin-top: 1.5rem;
    }
    .player-source-note {
      margin-top: 1.25rem;
      padding: 0.75rem 1rem;
      background: rgba(232,180,75,0.06);
      border: 1px solid rgba(232,180,75,0.15);
      border-radius: 8px;
      font-size: 0.78rem;
      color: var(--text-muted);
      max-width: 700px;
    }
    .player-source-note strong { color: var(--accent); }
  </style>
</head>
<body>

  <div class="player-page-wrap">
    <!-- Player -->
    <div class="player-container">
      <iframe
        id="playerFrame"
        src=""
        allowfullscreen
        allow="encrypted-media; autoplay; fullscreen"
        referrerpolicy="no-referrer"
        sandbox="allow-scripts allow-same-origin allow-forms allow-presentation"
      ></iframe>
    </div>

    <!-- Info bar -->
    <div class="player-info-section">
      <a class="player-back" id="playerBack" href="index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        Back to details
      </a>

      <h1 class="player-title" id="playerTitle">Loading…</h1>
      <p class="player-meta" id="playerMeta"></p>

      <!-- Episode navigation (TV only) -->
      <div id="episodeNav"></div>

      <div class="player-source-note">
        <strong>Note:</strong> Video is served via a third-party player. If one source doesn't load, try refreshing or waiting a moment. Your watch progress is automatically saved.
      </div>
    </div>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/watch.js"></script>
</body>
</html>

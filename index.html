<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamVault — Watch Movies & TV Shows</title>
  <meta name="description" content="Stream thousands of movies and TV shows for free on StreamVault.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>

  <!-- Hero -->
  <section class="hero" id="hero">
    <div class="hero-bg" id="heroBg"></div>
    <div class="hero-content">
      <div class="hero-badge" id="heroBadge">🎬 TRENDING</div>
      <h1 class="hero-title" id="heroTitle"></h1>
      <div class="hero-meta">
        <span id="heroRating"></span>
        <span class="sep">|</span>
        <span id="heroYear"></span>
      </div>
      <p class="hero-overview" id="heroOverview"></p>
      <div class="hero-btns">
        <a class="btn btn-primary" id="heroWatchBtn" href="#">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          Watch Now
        </a>
        <a class="btn btn-secondary" id="heroDetailBtn" href="#">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          More Info
        </a>
      </div>
    </div>
    <div class="hero-thumbs" id="heroThumbs"></div>
  </section>

  <!-- Main content rows -->
  <main id="homeContent"></main>

  <!-- Scripts -->
  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/layout.js"></script>
  <script src="assets/js/home.js"></script>
</body>
</html>
